# Gujarat source-module workflow — INDEPENDENT (Independence Principle).
# nProcure / (n)Code engine (non-GePNIC). v1.0 = FIXTURE MODE; the fixture carries
# a runError so this run DEGRADES (status ok:false) WITHOUT failing the job — it
# still commits the previously-captured tender's observation. That degradation is
# scoped to gujarat; cppp/rajasthan and the app are unaffected.
name: gujarat-scrape
on:
  schedule:
    - cron: "57 */6 * * *"      # offset from cppp/rajasthan
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: gujarat-scrape
  cancel-in-progress: false
env:
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Pinned deps (deterministic fixtures)
        run: pip install -r requirements.txt
      - name: OCR toolchain (inline OCR — v1.0 decision)
        run: sudo apt-get update -qq && sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-hin
      - name: Generate fixtures (FIXTURE MODE — live mode is the go-live step)
        run: python3 scripts/gen_fixtures.py
      - name: Scrape -> OCDS releases + observations + binaries/text/snapshots (./serve)
        run: python3 gujarat/scraper/scrape.py
      - name: Commit new releases + observations (append-only)
        run: |
          git config user.name  "sunshine-bot"
          git config user.email "bot@users.noreply.github.com"
          git add gujarat/releases gujarat/observations
          if git diff --cached --quiet; then
            echo "no new records this run"
          else
            git commit -m "gujarat: capture $(date -u +%FT%TZ)"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          fi
      - name: Sync binaries + text + snapshots to R2 (S3 API)
        if: ${{ env.R2_ACCESS_KEY_ID != '' }}
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_S3_ENDPOINT:       ${{ secrets.R2_S3_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
        run: |
          pip install awscli >/dev/null
          aws s3 sync ./serve/files "s3://${R2_BUCKET}/files" --endpoint-url "$R2_S3_ENDPOINT" --no-progress
          aws s3 cp ./serve/gujarat/status.json "s3://${R2_BUCKET}/gujarat/status.json" --endpoint-url "$R2_S3_ENDPOINT"
