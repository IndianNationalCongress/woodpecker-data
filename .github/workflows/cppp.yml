# CPPP LIVE — the base archive's engine. Pulls REAL tenders from eprocure.gov.in
# (GePNIC), maps them to OCDS + observations, and PUBLISHES the served layer to
# docs/ for GitHub Pages (no R2, no server). GET-only, polite (2.5s/req), bounded
# (scraper hard-caps at 10/run), no captcha/login (a block -> stop-and-report).
# Append-only. We keep the RECORD + the page TEXT + the transparency timeline +
# links to the portal (and best-effort Internet Archive); PDF bytes are a later,
# supervised "greedy" tier. (Fixture mode stays the local test suite in the monorepo.)
name: cppp-live
on:
  workflow_dispatch:
    inputs:
      max:
        description: "Max tenders to capture this run (the scraper hard-caps at 10)"
        default: "10"
  schedule:
    - cron: "23 6 * * *"     # once daily — deliberately gentle for an unattended live scrape
permissions:
  contents: write
concurrency:
  group: cppp-live
  cancel-in-progress: false
env:
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      # --live is stdlib-only (urllib); no pip deps, no OCR toolchain (no PDF bytes).
      - name: Live scrape — real tenders -> ledger + captured text into docs/
        run: python3 cppp/scraper/scrape.py --live --max "${{ github.event.inputs.max || '10' }}" --serve ./docs
      - name: Compile serving layer into docs/ (records + monthly indices + manifest)
        run: python3 compile/compile.py --data . --serve ./docs
      - name: Commit ledger + published serving layer (docs/ -> GitHub Pages)
        run: |
          git config user.name  "sunshine-bot"
          git config user.email "bot@users.noreply.github.com"
          touch docs/.nojekyll          # serve files verbatim (no Jekyll processing)
          git add cppp/releases cppp/observations docs
          if git diff --cached --quiet; then
            echo "no new tenders / no serving changes this run"
          else
            git commit -m "cppp: LIVE capture + publish $(date -u +%FT%TZ)"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          fi
      # When R2_* secrets are set, also mirror the served layer to R2 (optional, off by default).
      - name: Mirror serving layer to R2 (S3 API)
        if: ${{ env.R2_ACCESS_KEY_ID != '' }}
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_S3_ENDPOINT:       ${{ secrets.R2_S3_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
        run: |
          pip install awscli >/dev/null
          aws s3 sync ./docs "s3://${R2_BUCKET}" --no-progress --endpoint-url "$R2_S3_ENDPOINT"
