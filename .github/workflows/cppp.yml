# CPPP LIVE scrape — pulls REAL tenders from eprocure.gov.in (GePNIC) into the
# public archive. GET-only, polite (2.5s between requests), bounded (the scraper
# hard-caps at 10/run), no captcha/login (a block -> stop-and-report, never
# circumvent). Append-only: each run adds whatever's newly on the portal listing.
#
# This is the real "we keep what the government deletes" capture: tender metadata +
# the detail-page HTML/text today. PDF *bytes* need a supervised headless tier
# (CPPP's download anchors are stateful/non-GET) — a separate, later job.
# Fixture-mode CPPP remains the local test suite in the monorepo; this CI job is live.
name: cppp-live
on:
  workflow_dispatch:
    inputs:
      max:
        description: "Max tenders to capture this run (the scraper hard-caps at 10)"
        default: "10"
  schedule:
    - cron: "23 6 * * *"     # once daily — deliberately conservative for an unattended live scrape
permissions:
  contents: write            # commit captured releases + observations to the public ledger
concurrency:
  group: cppp-live
  cancel-in-progress: false
env:
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}   # job-level so the R2 step's `if` can read it
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      # --live is stdlib-only (urllib); no pip deps, no OCR toolchain (no PDF bytes fetched).
      - name: Live scrape — real GePNIC tenders -> OCDS releases + observations
        run: python3 cppp/scraper/scrape.py --live --max "${{ github.event.inputs.max || '10' }}"
      - name: Commit captured tenders (append-only)
        run: |
          git config user.name  "sunshine-bot"
          git config user.email "bot@users.noreply.github.com"
          git add cppp/releases cppp/observations
          if git diff --cached --quiet; then
            echo "no new tenders this run"
          else
            git commit -m "cppp: LIVE capture $(date -u +%FT%TZ)"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          fi
      - name: Sync captured text + snapshots to R2 (S3 API)
        if: ${{ env.R2_ACCESS_KEY_ID != '' }}
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_S3_ENDPOINT:       ${{ secrets.R2_S3_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
        run: |
          pip install awscli >/dev/null
          aws s3 sync ./serve/files "s3://${R2_BUCKET}/files" --endpoint-url "$R2_S3_ENDPOINT" --no-progress
